<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Based 3D Particle System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: #0a0a0a;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            z-index: 10;
            display: none;
        }

        #video.active {
            display: block;
        }

        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-section {
            margin-bottom: 24px;
        }

        .control-section:last-child {
            margin-bottom: 0;
        }

        .control-label {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .pattern-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
        }

        .pattern-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .pattern-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .color-preview:hover {
            transform: scale(1.1);
        }

        #color-picker {
            flex: 1;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.active {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .gesture-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            display: none;
            text-align: center;
        }

        .gesture-info.active {
            display: block;
        }

        .romantic-message {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.9) 0%, rgba(255, 20, 147, 0.9) 100%);
            backdrop-filter: blur(10px);
            padding: 24px 32px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 24px;
            font-weight: 700;
            z-index: 101;
            display: none;
            text-align: center;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.5);
            animation: messageFloat 3s ease-in-out infinite;
        }

        .romantic-message.active {
            display: block;
        }

        @keyframes messageFloat {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .floating-heart {
            position: absolute;
            font-size: 30px;
            animation: floatUp 4s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .fullscreen-icon {
            width: 20px;
            height: 20px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
        }

        .gesture-guide {
            position: absolute;
            top: 200px;
            right: 20px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            width: 220px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            z-index: 100;
        }

        .gesture-guide h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #ff69b4;
        }

        .gesture-guide ul {
            list-style: none;
            padding: 0;
        }

        .gesture-guide li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .gesture-guide li:before {
            content: "💕";
            position: absolute;
            left: 0;
        }

        .slider-container {
            margin-top: 8px;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 24px;
        }

        .switch-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .switch-slider {
            background-color: #667eea;
        }

        input:checked + .switch-slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hearts-container" id="hearts-container"></div>
    <video id="video" autoplay playsinline></video>

    <div class="control-panel">
        <div class="control-section">
            <label class="control-label">Pattern Selection</label>
            <div class="pattern-grid">
                <button class="pattern-btn active" data-pattern="sphere">Sphere</button>
                <button class="pattern-btn" data-pattern="cube">Cube</button>
                <button class="pattern-btn" data-pattern="torus">Torus</button>
                <button class="pattern-btn" data-pattern="helix">Helix</button>
                <button class="pattern-btn" data-pattern="wave">Wave</button>
                <button class="pattern-btn" data-pattern="galaxy">Galaxy</button>
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Color Theme</label>
            <div class="color-picker-container">
                <div class="color-preview" id="color-preview"></div>
                <input type="color" id="color-picker" value="#ff69b4">
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Particle Count: <span id="particle-count-value">5000</span></label>
            <div class="slider-container">
                <input type="range" min="1000" max="10000" step="500" value="5000" class="slider" id="particle-count-slider">
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Particle Size: <span id="particle-size-value">0.15</span></label>
            <div class="slider-container">
                <input type="range" min="0.05" max="0.5" step="0.05" value="0.15" class="slider" id="particle-size-slider">
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Settings</label>
            <div class="toggle-switch">
                <label class="switch">
                    <input type="checkbox" id="gyro-toggle" checked>
                    <span class="switch-slider"></span>
                </label>
                <span>Gyroscope</span>
            </div>
            <div class="toggle-switch">
                <label class="switch">
                    <input type="checkbox" id="auto-rotate-toggle" checked>
                    <span class="switch-slider"></span>
                </label>
                <span>Auto Rotate</span>
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Hand Tracking</label>
            <div class="btn-group">
                <button class="control-btn" id="camera-btn">
                    <span class="status-indicator"></span>
                    Start Camera
                </button>
            </div>
        </div>
    </div>

    <div class="gesture-guide">
        <h3>Romantic Gestures</h3>
        <ul>
            <li>✌️ Peace: Heart Shape</li>
            <li>🫵 Point: I Love You</li>
            <li>👊 Fist: Saturn Ring</li>
            <li>👍 Thumbs: Star Burst</li>
            <li>🤘 Rock: Music Notes</li>
            <li>✋ Open: Expand All</li>
            <li>✊ Close: Contract All</li>
        </ul>
    </div>

    <div class="gesture-info" id="gesture-info">
        Open hand to expand • Close hand to contract
    </div>

    <div class="romantic-message" id="romantic-message"></div>

    <button class="fullscreen-btn" id="fullscreen-btn">
        <svg class="fullscreen-icon" viewBox="0 0 24 24">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // Three.js Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        camera.position.z = 50;

        // Gyroscope variables
        let gyroEnabled = true;
        let autoRotateEnabled = true;
        let deviceAlpha = 0;
        let deviceBeta = 0;
        let deviceGamma = 0;

        // Particle System
        let particles;
        let particlePositions = [];
        let targetPositions = [];
        let particleCount = 5000;
        let particleSize = 0.15;
        let currentPattern = 'sphere';
        let particleColor = new THREE.Color('#ff69b4');
        let handOpenness = 0.5;
        let targetScale = 1.0;
        let currentGesture = 'none';
        let gestureStartTime = 0;

        const particleGeometry = new THREE.BufferGeometry();
        let positions;
        let colors;

        function initParticleArrays() {
            positions = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);
        }

        initParticleArrays();

        function createPattern(pattern) {
            const positions = [];
            const radius = 20;

            switch(pattern) {
                case 'sphere':
                    for(let i = 0; i < particleCount; i++) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const r = radius * Math.cbrt(Math.random());
                        positions.push(
                            r * Math.sin(phi) * Math.cos(theta),
                            r * Math.sin(phi) * Math.sin(theta),
                            r * Math.cos(phi)
                        );
                    }
                    break;

                case 'cube':
                    for(let i = 0; i < particleCount; i++) {
                        const side = Math.floor(Math.random() * 6);
                        const u = Math.random() - 0.5;
                        const v = Math.random() - 0.5;
                        const size = radius;
                        
                        if(side === 0) positions.push(size, u * size * 2, v * size * 2);
                        else if(side === 1) positions.push(-size, u * size * 2, v * size * 2);
                        else if(side === 2) positions.push(u * size * 2, size, v * size * 2);
                        else if(side === 3) positions.push(u * size * 2, -size, v * size * 2);
                        else if(side === 4) positions.push(u * size * 2, v * size * 2, size);
                        else positions.push(u * size * 2, v * size * 2, -size);
                    }
                    break;

                case 'torus':
                    const R = radius;
                    const r = radius * 0.4;
                    for(let i = 0; i < particleCount; i++) {
                        const u = Math.random() * Math.PI * 2;
                        const v = Math.random() * Math.PI * 2;
                        const x = (R + r * Math.cos(v)) * Math.cos(u);
                        const y = (R + r * Math.cos(v)) * Math.sin(u);
                        const z = r * Math.sin(v);
                        positions.push(x, y, z);
                    }
                    break;

                case 'helix':
                    for(let i = 0; i < particleCount; i++) {
                        const t = (i / particleCount) * Math.PI * 8;
                        const r = radius * 0.5;
                        positions.push(
                            r * Math.cos(t),
                            (t / Math.PI) * 3 - 12,
                            r * Math.sin(t)
                        );
                    }
                    break;

                case 'wave':
                    const gridSize = Math.ceil(Math.sqrt(particleCount));
                    let count = 0;
                    for(let i = 0; i < gridSize && count < particleCount; i++) {
                        for(let j = 0; j < gridSize && count < particleCount; j++) {
                            const x = (i / gridSize - 0.5) * radius * 2;
                            const z = (j / gridSize - 0.5) * radius * 2;
                            const y = Math.sin(x * 0.3) * Math.cos(z * 0.3) * 5;
                            positions.push(x, y, z);
                            count++;
                        }
                    }
                    break;

                case 'galaxy':
                    for(let i = 0; i < particleCount; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const r = Math.random() * radius;
                        const spiral = r * 0.5;
                        positions.push(
                            r * Math.cos(angle + spiral),
                            (Math.random() - 0.5) * 3,
                            r * Math.sin(angle + spiral)
                        );
                    }
                    break;
            }

            return positions;
        }

        function createHeartShape() {
            const positions = [];
            const scale = 0.8;
            
            for(let i = 0; i < particleCount; i++) {
                const t = (i / particleCount) * Math.PI * 2;
                
                // Parametric heart curve
                const x = scale * 16 * Math.pow(Math.sin(t), 3);
                const y = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                // Add some depth variation
                const depthVariation = Math.sin(t * 5) * 2;
                const z = (Math.random() - 0.5) * 3 + depthVariation;
                
                positions.push(x, y - 5, z);
            }
            
            return positions;
        }

        function createILoveYouParticles() {
            const positions = [];
            const text = "I ❤️ U";
            const scale = 2.5;
            
            // Define letter shapes with connected points
            const letters = {
                'I': [
                    [0, 2], [0, 1.5], [0, 1], [0, 0.5], [0, 0], [0, -0.5], [0, -1], [0, -1.5], [0, -2]
                ],
                '❤️': [
                    // Left curve of heart
                    [-0.8, 1], [-1, 0.5], [-1, 0], [-0.8, -0.5], [-0.5, -1],
                    // Bottom point
                    [0, -1.5],
                    // Right curve of heart
                    [0.5, -1], [0.8, -0.5], [1, 0], [1, 0.5], [0.8, 1],
                    // Top curves
                    [-0.5, 1.2], [0, 1], [0.5, 1.2],
                    // Fill points
                    [-0.5, 0.5], [0, 0.5], [0.5, 0.5],
                    [-0.5, 0], [0, 0], [0.5, 0],
                    [-0.3, -0.5], [0, -0.8], [0.3, -0.5]
                ],
                'U': [
                    [-1, 2], [-1, 1.5], [-1, 1], [-1, 0.5], [-1, 0], [-1, -0.5],
                    [-0.8, -1], [-0.5, -1.3], [0, -1.5], [0.5, -1.3], [0.8, -1],
                    [1, -0.5], [1, 0], [1, 0.5], [1, 1], [1, 1.5], [1, 2]
                ]
            };
            
            const letterSpacing = 5;
            const startX = -letterSpacing * 1.5;
            
            let letterIndex = 0;
            for(let char of text.split('')) {
                if(char === ' ') {
                    letterIndex++;
                    continue;
                }
                
                const letterPoints = letters[char] || [[0, 0]];
                const pointsPerDot = Math.floor(particleCount / (text.replace(/ /g, '').length * letterPoints.length));
                
                for(let point of letterPoints) {
                    for(let j = 0; j < pointsPerDot; j++) {
                        const offsetX = startX + letterIndex * letterSpacing;
                        const x = offsetX + point[0] * scale + (Math.random() - 0.5) * 0.3;
                        const y = point[1] * scale + (Math.random() - 0.5) * 0.3;
                        const z = (Math.random() - 0.5) * 2;
                        
                        positions.push(x, y, z);
                    }
                }
                
                letterIndex++;
            }
            
            // Fill remaining particles
            while(positions.length < particleCount * 3) {
                positions.push(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 5
                );
            }
            
            return positions;
        }

        function createSaturnParticles() {
            const positions = [];
            const planetRadius = 6;
            const ringInnerRadius = 9;
            const ringOuterRadius = 15;
            const ringThickness = 0.5;
            
            const planetPoints = Math.floor(particleCount * 0.35);
            const ringPoints = particleCount - planetPoints;
            
            // Planet sphere with realistic distribution
            for(let i = 0; i < planetPoints; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = planetRadius * Math.cbrt(Math.random());
                
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            }
            
            // Ring with realistic distribution and tilt
            const tiltAngle = Math.PI / 6;
            for(let i = 0; i < ringPoints; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = ringInnerRadius + Math.random() * (ringOuterRadius - ringInnerRadius);
                
                // Ring density falloff
                const densityFactor = 1 - Math.abs((radius - (ringInnerRadius + ringOuterRadius) / 2) / ((ringOuterRadius - ringInnerRadius) / 2));
                const y = (Math.random() - 0.5) * ringThickness * densityFactor;
                
                let x = radius * Math.cos(angle);
                let z = radius * Math.sin(angle);
                
                // Apply tilt
                const newY = y * Math.cos(tiltAngle) - z * Math.sin(tiltAngle);
                const newZ = y * Math.sin(tiltAngle) + z * Math.cos(tiltAngle);
                
                positions.push(x, newY, newZ);
            }
            
            return positions;
        }

        function createStarBurst() {
            const positions = [];
            const rays = 20;
            const pointsPerRay = Math.floor(particleCount / rays);
            
            for(let i = 0; i < rays; i++) {
                const angle = (i / rays) * Math.PI * 2;
                
                for(let j = 0; j < pointsPerRay; j++) {
                    const distance = (j / pointsPerRay) * 25;
                    const spread = (j / pointsPerRay) * 2;
                    
                    positions.push(
                        distance * Math.cos(angle) + (Math.random() - 0.5) * spread,
                        distance * Math.sin(angle) + (Math.random() - 0.5) * spread,
                        (Math.random() - 0.5) * 5
                    );
                }
            }
            
            return positions;
        }

        function createMusicNotes() {
            const positions = [];
            const numNotes = 8;
            const pointsPerNote = Math.floor(particleCount / numNotes);
            
            for(let n = 0; n < numNotes; n++) {
                const offsetX = (n - numNotes / 2) * 6;
                const offsetY = Math.sin(n * 0.8) * 3;
                const scale = 1.2;
                
                // Note head (filled circle)
                const headPoints = Math.floor(pointsPerNote * 0.4);
                const headRadius = 1.2 * scale;
                for(let i = 0; i < headPoints; i++) {
                    const angle = (i / headPoints) * Math.PI * 2;
                    const r = Math.random() * headRadius;
                    positions.push(
                        offsetX + r * Math.cos(angle),
                        offsetY + r * Math.sin(angle),
                        (Math.random() - 0.5) * 1.5
                    );
                }
                
                // Note stem (vertical line)
                const stemPoints = Math.floor(pointsPerNote * 0.35);
                const stemHeight = 6 * scale;
                for(let i = 0; i < stemPoints; i++) {
                    const t = i / stemPoints;
                    positions.push(
                        offsetX + headRadius * 0.8 + (Math.random() - 0.5) * 0.3,
                        offsetY - t * stemHeight,
                        (Math.random() - 0.5) * 1.5
                    );
                }
                
                // Note flag (curved line at top)
                const flagPoints = pointsPerNote - headPoints - stemPoints;
                for(let i = 0; i < flagPoints; i++) {
                    const t = i / flagPoints;
                    const curve = Math.sin(t * Math.PI) * 2 * scale;
                    positions.push(
                        offsetX + headRadius * 0.8 + curve,
                        offsetY - stemHeight + t * 2 * scale,
                        (Math.random() - 0.5) * 1.5
                    );
                }
            }
            
            return positions;
        }

        function initParticles() {
            targetPositions = createPattern(currentPattern);
            
            for(let i = 0; i < particleCount * 3; i += 3) {
                if(i < targetPositions.length) {
                    positions[i] = targetPositions[i] + (Math.random() - 0.5) * 10;
                    positions[i + 1] = targetPositions[i + 1] + (Math.random() - 0.5) * 10;
                    positions[i + 2] = targetPositions[i + 2] + (Math.random() - 0.5) * 10;
                } else {
                    positions[i] = 0;
                    positions[i + 1] = 0;
                    positions[i + 2] = 0;
                }
                
                colors[i] = particleColor.r;
                colors[i + 1] = particleColor.g;
                colors[i + 2] = particleColor.b;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: particleSize,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8
            });

            if(particles) {
                scene.remove(particles);
            }

            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        initParticles();

        // Heart Animation
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('hearts-container').appendChild(heart);
            
            setTimeout(() => heart.remove(), 4000);
        }

        // Gesture Detection
        function detectGesture(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];
            
            const indexBase = landmarks[5];
            const middleBase = landmarks[9];
            const ringBase = landmarks[13];
            const pinkyBase = landmarks[17];
            const wrist = landmarks[0];
            
            // Peace sign ✌️
            const indexUp = indexTip.y < indexBase.y;
            const middleUp = middleTip.y < middleBase.y;
            const ringDown = ringTip.y > ringBase.y;
            const pinkyDown = pinkyTip.y > pinkyBase.y;
            
            if (indexUp && middleUp && ringDown && pinkyDown) {
                return 'peace';
            }
            
            // Pointing 🫵
            const onlyIndexUp = indexUp && !middleUp && ringDown && pinkyDown;
            if (onlyIndexUp) {
                return 'pointing';
            }
            
            // Closed fist 👊
            const allClosed = indexTip.y > indexBase.y && 
                            middleTip.y > middleBase.y && 
                            ringTip.y > ringBase.y && 
                            pinkyTip.y > pinkyBase.y;
            
            if (allClosed && thumbTip.y > landmarks[2].y) {
                return 'fist';
            }
            
            // Thumbs up 👍
            const thumbUp = thumbTip.y < landmarks[3].y && thumbTip.y < landmarks[2].y;
            const fingersClosed = indexTip.y > indexBase.y && middleTip.y > middleBase.y && 
                                ringTip.y > ringBase.y && pinkyTip.y > pinkyBase.y;
            
            if (thumbUp && fingersClosed) {
                return 'thumbsup';
            }
            
            // Rock sign 🤘
            const pinkyUp = pinkyTip.y < pinkyBase.y;
            const middleDown = middleTip.y > middleBase.y;
            
            if (indexUp && pinkyUp && middleDown && ringDown) {
                return 'rock';
            }
            
            return 'none';
        }

        function handleGestureParticles(gesture) {
            switch(gesture) {
                case 'peace':
                    targetPositions = createHeartShape();
                    animateColorChange(new THREE.Color('#ff1493'));
                    for(let i = 0; i < 10; i++) {
                        setTimeout(() => createFloatingHeart(), i * 100);
                    }
                    showMessage('❤️ Hearts for You! ❤️');
                    break;
                    
                case 'pointing':
                    targetPositions = createILoveYouParticles();
                    animateColorChange(new THREE.Color('#ff69b4'));
                    showMessage('💖 I ❤️ U 💖');
                    break;
                    
                case 'fist':
                    targetPositions = createSaturnParticles();
                    animateColorChange(new THREE.Color('#ffd700'));
                    showMessage('🪐 You\'re My World 🪐');
                    break;
                    
                case 'thumbsup':
                    targetPositions = createStarBurst();
                    animateColorChange(new THREE.Color('#ffff00'));
                    showMessage('⭐ You\'re a Star! ⭐');
                    break;
                    
                case 'rock':
                    targetPositions = createMusicNotes();
                    animateColorChange(new THREE.Color('#9d4edd'));
                    showMessage('🎵 You Rock My World! 🎵');
                    break;
            }
        }

        function showMessage(text) {
            const messageEl = document.getElementById('romantic-message');
            messageEl.textContent = text;
            messageEl.classList.add('active');
            
            setTimeout(() => {
                messageEl.classList.remove('active');
            }, 3000);
        }

        function animateColorChange(targetColor) {
            const colors = particleGeometry.attributes.color.array;
            const startColor = particleColor.clone();
            let progress = 0;
            
            const colorInterval = setInterval(() => {
                progress += 0.05;
                if (progress >= 1) {
                    clearInterval(colorInterval);
                    particleColor = targetColor;
                }
                
                const currentColor = startColor.clone().lerp(targetColor, progress);
                
                for(let i = 0; i < particleCount * 3; i += 3) {
                    colors[i] = currentColor.r;
                    colors[i + 1] = currentColor.g;
                    colors[i + 2] = currentColor.b;
                }
                particleGeometry.attributes.color.needsUpdate = true;
            }, 50);
        }

        // Gyroscope
        function handleOrientation(event) {
            if (!gyroEnabled) return;
            
            deviceAlpha = event.alpha || 0;
            deviceBeta = event.beta || 0;
            deviceGamma = event.gamma || 0;
        }

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // Hand Tracking
        let hands;
        let cameraInstance;
        let isCameraActive = false;

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Calculate hand openness
                const thumb = landmarks[4];
                const index = landmarks[8];
                const middle = landmarks[12];
                const ring = landmarks[16];
                const pinky = landmarks[20];
                
                const distance1 = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                const distance2 = Math.hypot(thumb.x - middle.x, thumb.y - middle.y);
                const distance3 = Math.hypot(thumb.x - ring.x, thumb.y - ring.y);
                const distance4 = Math.hypot(thumb.x - pinky.x, thumb.y - pinky.y);
                
                const avgDistance = (distance1 + distance2 + distance3 + distance4) / 4;
                handOpenness = Math.min(Math.max(avgDistance * 5, 0), 1);
                
                // Detect gestures
                const detectedGesture = detectGesture(landmarks);
                
                if (detectedGesture !== 'none' && detectedGesture !== currentGesture) {
                    currentGesture = detectedGesture;
                    gestureStartTime = Date.now();
                    handleGestureParticles(detectedGesture);
                } else if (detectedGesture === 'none') {
                    if (Date.now() - gestureStartTime > 2000) {
                        currentGesture = 'none';
                    }
                }
                
                document.getElementById('gesture-info').classList.add('active');
            } else {
                document.getElementById('gesture-info').classList.remove('active');
            }
        }

        async function initCamera() {
            const video = document.getElementById('video');
            
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults(onResults);
            
            cameraInstance = new Camera(video, {
                onFrame: async () => {
                    await hands.send({image: video});
                },
                width: 640,
                height: 480
            });
            
            await cameraInstance.start();
            video.classList.add('active');
            isCameraActive = true;
            
            document.getElementById('camera-btn').classList.add('active');
            document.getElementById('camera-btn').innerHTML = '<span class="status-indicator active"></span> Camera Active';
        }

        function stopCamera() {
            if(cameraInstance) {
                cameraInstance.stop();
                document.getElementById('video').classList.remove('active');
                isCameraActive = false;
                document.getElementById('camera-btn').classList.remove('active');
                document.getElementById('camera-btn').innerHTML = '<span class="status-indicator"></span> Start Camera';
            }
        }

        // Animation
        let autoRotation = 0;

        function animate() {
            requestAnimationFrame(animate);

            targetScale = 0.3 + handOpenness * 1.2;
            const dispersion = 20 * (1 - handOpenness);

            const positions = particleGeometry.attributes.position.array;
            
            for(let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                if(i3 < targetPositions.length) {
                    const targetX = targetPositions[i3] * targetScale + (Math.random() - 0.5) * dispersion;
                    const targetY = targetPositions[i3 + 1] * targetScale + (Math.random() - 0.5) * dispersion;
                    const targetZ = targetPositions[i3 + 2] * targetScale + (Math.random() - 0.5) * dispersion;
                    
                    positions[i3] += (targetX - positions[i3]) * 0.05;
                    positions[i3 + 1] += (targetY - positions[i3 + 1]) * 0.05;
                    positions[i3 + 2] += (targetZ - positions[i3 + 2]) * 0.05;
                }
            }
            
            particleGeometry.attributes.position.needsUpdate = true;
            
            // Apply gyroscope rotation
            if (gyroEnabled && (deviceBeta !== 0 || deviceGamma !== 0)) {
                particles.rotation.x = (deviceBeta - 90) * (Math.PI / 180) * 0.3;
                particles.rotation.y = deviceGamma * (Math.PI / 180) * 0.3;
            } else if (autoRotateEnabled) {
                autoRotation += 0.001;
                particles.rotation.y = autoRotation;
            }
            
            renderer.render(scene, camera);
        }

        animate();

        // Event Listeners
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPattern = btn.dataset.pattern;
                targetPositions = createPattern(currentPattern);
            });
        });

        document.getElementById('color-picker').addEventListener('input', (e) => {
            particleColor.set(e.target.value);
            document.getElementById('color-preview').style.background = e.target.value;
            
            const colors = particleGeometry.attributes.color.array;
            for(let i = 0; i < particleCount * 3; i += 3) {
                colors[i] = particleColor.r;
                colors[i + 1] = particleColor.g;
                colors[i + 2] = particleColor.b;
            }
            particleGeometry.attributes.color.needsUpdate = true;
        });

        document.getElementById('color-preview').style.background = '#ff69b4';

        document.getElementById('particle-count-slider').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('particle-count-value').textContent = particleCount;
            initParticleArrays();
            initParticles();
        });

        document.getElementById('particle-size-slider').addEventListener('input', (e) => {
            particleSize = parseFloat(e.target.value);
            document.getElementById('particle-size-value').textContent = particleSize;
            if(particles && particles.material) {
                particles.material.size = particleSize;
            }
        });

        document.getElementById('gyro-toggle').addEventListener('change', (e) => {
            gyroEnabled = e.target.checked;
        });

        document.getElementById('auto-rotate-toggle').addEventListener('change', (e) => {
            autoRotateEnabled = e.target.checked;
        });

        document.getElementById('camera-btn').addEventListener('click', () => {
            if(!isCameraActive) {
                initCamera();
            } else {
                stopCamera();
            }
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if(!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
